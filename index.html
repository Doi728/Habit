// Helper: Get local date string YYYY-MM-DD
function getDayKey(date) { 
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`; 
}

function getLast365Days() {
  const days = [];
  const now = new Date();
  // กำหนดให้เป็นเวลา 00:00:00 ของวันนี้ในเวลาท้องถิ่นเพื่อให้การคำนวณข้ามวันแม่นยำ
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  
  for (let i = 364; i >= 0; i--) { 
    const d = new Date(today);
    d.setDate(today.getDate() - i); 
    days.push(getDayKey(d)); 
  }
  return days;
}

function getWeeksForHeatmap(days) {
  const firstDay = new Date(days[0].replace(/-/g, '/')), startWeekDay = firstDay.getDay();
  const padded = Array(startWeekDay).fill(null).concat(days);
  const weeks = [];
  for (let i = 0; i < padded.length; i += 7) weeks.push(padded.slice(i, i + 7));
  return weeks;
}

// ─── Color Wheel ──────────────────────────────────────────────────────────────
function ColorWheel({ color, onChange }) {
  const canvasRef = useRef(null);
  const brightnessRef = useRef(null);
  const isDragging = useRef(false);
  const isBrightDragging = useRef(false);
  const SIZE = 200;
  const BRIGHT_H = 20;

  function hexToHsv(hex) {
    hex = hex.replace('#','');
    if (hex.length === 3) hex = hex.split('').map(c => c+c).join('');
    let r = parseInt(hex.slice(0,2),16)/255, g = parseInt(hex.slice(2,4),16)/255, b = parseInt(hex.slice(4,6),16)/255;
    const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min;
    let h = 0, s = max === 0 ? 0 : d/max, v = max;
    if (d !== 0) {
      if (max === r) h = ((g - b)/d + (g < b ? 6 : 0)) / 6;
      else if (max === g) h = ((b - r)/d + 2) / 6;
      else h = ((r - g)/d + 4) / 6;
    }
    return { h: h * 360, s, v };
  }

  function hsvToHex(h, s, v) {
    h = h / 360;
    let r,g,b;
    const i = Math.floor(h*6), f = h*6 - i, p = v*(1-s), q = v*(1-f*s), t = v*(1-(1-f)*s);
    switch(i % 6) {
      case 0: r=v; g=t; b=p; break; case 1: r=q; g=v; b=p; break;
      case 2: r=p; g=v; b=t; break; case 3: r=p; g=q; b=v; break;
      case 4: r=t; g=p; b=v; break; case 5: r=v; g=p; b=q; break;
    }
    return "#" + [r,g,b].map(x => Math.round(x*255).toString(16).padStart(2,'0')).join('');
  }

  const hsvRef = useRef(hexToHsv(color));

  useEffect(() => { hsvRef.current = hexToHsv(color); drawWheel(); drawBrightness(); }, []);

  function drawWheel() {
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const cx = SIZE/2, cy = SIZE/2, r = SIZE/2 - 4;
    ctx.clearRect(0,0,SIZE,SIZE);
    for (let angle = 0; angle < 360; angle++) {
      const start = (angle - 1) * Math.PI / 180, end = (angle + 1) * Math.PI / 180;
      const grad = ctx.createRadialGradient(cx,cy,r*0.38,cx,cy,r);
      grad.addColorStop(0, `hsla(${angle},100%,50%,0)`);
      grad.addColorStop(1, `hsl(${angle},100%,50%)`);
      ctx.beginPath(); ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,r,start,end); ctx.closePath();
      ctx.fillStyle = grad; ctx.fill();
    }
    const overlay = ctx.createRadialGradient(cx,cy,0,cx,cy,r*0.38);
    overlay.addColorStop(0, 'rgba(255,255,255,1)'); overlay.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle = overlay; ctx.fill();
    const darkOverlay = ctx.createRadialGradient(cx,cy,r*0.55,cx,cy,r*0.38);
    darkOverlay.addColorStop(0, `rgba(0,0,0,${1 - hsvRef.current.v})`); darkOverlay.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle = darkOverlay; ctx.fill();
    const hsv = hsvRef.current;
    const innerR = r * 0.38 + (r - r*0.38) * hsv.s;
    const angle = hsv.h * Math.PI / 180;
    const cx2 = cx + innerR * Math.cos(angle), cy2 = cy + innerR * Math.sin(angle);
    ctx.beginPath(); ctx.arc(cx2, cy2, 8, 0, Math.PI*2);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx2, cy2, 6, 0, Math.PI*2);
    ctx.fillStyle = hsvToHex(hsv.h, hsv.s, 1); ctx.fill();
  }

  function drawBrightness() {
    const canvas = brightnessRef.current; if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0,0,w,h);
    const hsv = hsvRef.current;
    const grad = ctx.createLinearGradient(0,0,w,0);
    grad.addColorStop(0, '#000');
    grad.addColorStop(1, hsvToHex(hsv.h, hsv.s, 1));
    ctx.roundRect(0,0,w,h,6); ctx.fillStyle = grad; ctx.fill();
    const cx = hsv.v * w;
    ctx.beginPath(); ctx.arc(cx, h/2, 7, 0, Math.PI*2);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, h/2, 5, 0, Math.PI*2);
    ctx.fillStyle = hsvToHex(hsv.h, hsv.s, hsv.v); ctx.fill();
  }

  function handleWheel(e) {
    const canvas = canvasRef.current; if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const x = (clientX - rect.left) * (SIZE / rect.width) - SIZE/2;
    const y = (clientY - rect.top) * (SIZE / rect.height) - SIZE/2;
    const dist = Math.sqrt(x*x + y*y), r = SIZE/2 - 4;
    if (dist > r) return;
    const h = ((Math.atan2(y,x) * 180 / Math.PI) + 360) % 360;
    const inner = r * 0.38, outer = r;
    const s = Math.min(1, Math.max(0, (dist - inner) / (outer - inner)));
    hsvRef.current = { ...hsvRef.current, h, s };
    drawWheel(); drawBrightness();
    onChange(hsvToHex(hsvRef.current.h, hsvRef.current.s, hsvRef.current.v));
  }

  function handleBrightness(e) {
    const canvas = brightnessRef.current; if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const v = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
    hsvRef.current = { ...hsvRef.current, v };
    drawWheel(); drawBrightness();
    onChange(hsvToHex(hsvRef.current.h, hsvRef.current.s, hsvRef.current.v));
  }

  useEffect(() => { drawWheel(); drawBrightness(); }, []);

  const presets = ["#FF6B6B","#FF9F43","#FECA57","#48DBFB","#1DD1A1","#4ECDC4","#A29BFE","#FD79A8","#F0EDE4","#74B9FF"];

  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 12 }}>
      <canvas ref={canvasRef} width={SIZE} height={SIZE} className="wheel-canvas"
        style={{ width: 200, height: 200 }}
        onMouseDown={() => isDragging.current = true}
        onMouseMove={e => isDragging.current && handleWheel(e)}
        onMouseUp={() => isDragging.current = false}
        onMouseLeave={() => isDragging.current = false}
        onClick={handleWheel}
        onTouchStart={e => { isDragging.current = true; handleWheel(e); }}
        onTouchMove={e => { e.preventDefault(); handleWheel(e); }}
        onTouchEnd={() => isDragging.current = false}
      />
      <canvas ref={brightnessRef} width={200} height={20}
        style={{ width: 200, height: 20, borderRadius: 6, cursor: 'pointer' }}
        onClick={handleBrightness}
        onMouseDown={() => isBrightDragging.current = true}
        onMouseMove={e => isBrightDragging.current && handleBrightness(e)}
        onMouseUp={() => isBrightDragging.current = false}
        onMouseLeave={() => isBrightDragging.current = false}
        onTouchStart={e => { isBrightDragging.current = true; handleBrightness(e); }}
        onTouchMove={e => { e.preventDefault(); handleBrightness(e); }}
        onTouchEnd={() => isBrightDragging.current = false}
      />
      <div style={{ display: "flex", alignItems: "center", gap: 10, width: 200 }}>
        <div style={{ width: 36, height: 36, borderRadius: 10, background: color, border: "2px solid #2A2A2A", flexShrink: 0 }} />
        <div style={{ flex: 1, background: "#1A1A1A", border: "1px solid #2A2A2A", borderRadius: 8, padding: "8px 10px", fontSize: 12, color: "#F0EDE4", letterSpacing: 1, fontFamily: "inherit" }}>
          {color.toUpperCase()}
        </div>
      </div>
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", width: 200, justifyContent: "center" }}>
        {presets.map(p => (
          <button key={p} onClick={() => { hsvRef.current = hexToHsv(p); drawWheel(); drawBrightness(); onChange(p); }}
            style={{ width: 28, height: 28, borderRadius: "50%", background: p, border: color === p ? "2.5px solid #F0EDE4" : "2px solid transparent", cursor: "pointer", padding: 0, transition: "transform 0.15s" }}
          />
        ))}
      </div>
    </div>
  );
}

// ─── Habit Card ───────────────────────────────────────────────────────────────
function HabitCard({ habit, done, streak, onToggle, onDelete }) {
  const color = habit.color || "#4ECDC4";
  const [offset, setOffset] = useState(0);
  const [revealed, setRevealed] = useState(false);
  const startX = useRef(null);
  const dragging = useRef(false);
  const REVEAL = 72;

  function onTouchStart(e) { startX.current = e.touches[0].clientX; dragging.current = false; }
  function onTouchMove(e) {
    if (startX.current === null) return;
    const dx = e.touches[0].clientX - startX.current;
    if (Math.abs(dx) > 4) dragging.current = true;
    if (dx < 0) setOffset(Math.max(dx, -(REVEAL+16)));
    else if (revealed) setOffset(Math.min(0, dx - REVEAL));
  }
  function onTouchEnd() {
    if (offset < -REVEAL/2) { setOffset(-REVEAL); setRevealed(true); }
    else { setOffset(0); setRevealed(false); }
    startX.current = null;
  }
  function handleCardClick() {
    if (revealed) { setOffset(0); setRevealed(false); }
    else if (!dragging.current) onToggle();
  }

  return (
    <div style={{ position:"relative",borderRadius:16,overflow:"hidden" }}>
      <div style={{ position:"absolute",right:0,top:0,bottom:0,width:REVEAL,background:"#FF6B6B",borderRadius:16,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2 }}>
        <span style={{ fontSize:18 }}>🗑️</span>
        <span style={{ fontSize:8,color:"#0D0D0D",fontWeight:700,letterSpacing:1,textTransform:"uppercase" }}>ลบ</span>
      </div>
      <div
        onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd} onClick={handleCardClick}
        style={{ background:done?color:"#141414",border:`1px solid ${done?color:"#222"}`,borderRadius:16,padding:"18px 20px",display:"flex",alignItems:"center",gap:16,cursor:"pointer",userSelect:"none",transform:`translateX(${offset}px) scale(${done?1.01:1})`,transition:startX.current!==null?"none":"all 0.3s cubic-bezier(0.34,1.56,0.64,1)",position:"relative",zIndex:1 }}
      >
        <div style={{ width:48,height:48,background:done?"rgba(0,0,0,0.15)":"#1E1E1E",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0 }}>{habit.icon}</div>
        <div style={{ flex:1,minWidth:0 }}>
          <div style={{ fontSize:16,fontWeight:600,letterSpacing:-0.3,color:done?"#0D0D0D":"#F0EDE4",textDecoration:done?"line-through":"none",opacity:done?0.7:1 }}>{habit.name}</div>
          <div style={{ fontSize:11,letterSpacing:1,marginTop:3,textTransform:"uppercase",color:done?"rgba(0,0,0,0.5)":"#555" }}>{streak>0?`🔥 ${streak} วันติด`:"เริ่มวันนี้เลย!"}</div>
        </div>
        <div style={{ width:32,height:32,borderRadius:"50%",background:done?"rgba(0,0,0,0.2)":"#1E1E1E",border:`2px solid ${done?"rgba(0,0,0,0.3)":"#333"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0 }}>{done?"✓":""}</div>
        <button onClick={e=>{e.stopPropagation();onDelete();}} style={{ background:"transparent",border:"none",padding:"4px 2px",color:done?"rgba(0,0,0,0.3)":"#2E2E2E",fontSize:15,cursor:"pointer",flexShrink:0,lineHeight:1 }}>✕</button>
      </div>
      {revealed && <div onClick={e=>{e.stopPropagation();onDelete();}} style={{ position:"absolute",right:0,top:0,bottom:0,width:REVEAL,zIndex:2,cursor:"pointer" }}/>}
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function HabitTracker() {
  const [habits, setHabits] = useState(() => { try { return JSON.parse(localStorage.getItem("habits")||"[]"); } catch { return []; } });
  const [logs, setLogs] = useState(() => { try { return JSON.parse(localStorage.getItem("habitLogs")||"{}"); } catch { return {}; } });
  const [showAdd, setShowAdd] = useState(false);
  const [newName, setNewName] = useState("");
  const [newIcon, setNewIcon] = useState("🏃");
  const [newColor, setNewColor] = useState("#4ECDC4");
  const [addTab, setAddTab] = useState("icon"); 
  const [selectedHabit, setSelectedHabit] = useState(null);
  const [view, setView] = useState("today");
  const [confirmDelete, setConfirmDelete] = useState(null);

  const [now, setNow] = useState(new Date());
  useEffect(() => {
    const timer = setInterval(() => setNow(new Date()), 60000);
    return () => clearInterval(timer);
  }, []);

  const todayKey = getDayKey(now);
  const allDays = getLast365Days();

  useEffect(() => { localStorage.setItem("habits", JSON.stringify(habits)); }, [habits]);
  useEffect(() => { localStorage.setItem("habitLogs", JSON.stringify(logs)); }, [logs]);

  function addHabit() {
    if (!newName.trim()) return;
    setHabits(prev => [...prev, { id: Date.now().toString(), name: newName.trim(), icon: newIcon, color: newColor, createdAt: todayKey }]);
    setNewName(""); setNewIcon("🏃"); setNewColor("#4ECDC4"); setAddTab("icon"); setShowAdd(false);
  }

  function toggleToday(habitId) {
    setLogs(prev => { const key=`${habitId}:${todayKey}`; return {...prev,[key]:!prev[key]}; });
  }

  function deleteHabit(habitId) {
    const id = String(habitId);
    setHabits(prev => prev.filter(h => String(h.id) !== id));
    setLogs(prev => { const u={...prev}; Object.keys(u).forEach(k=>{if(k.startsWith(id+":"))delete u[k];}); return u; });
    if (String(selectedHabit) === id) setSelectedHabit(null);
    setConfirmDelete(null);
  }

  function isDone(habitId, dayKey) { return !!logs[`${habitId}:${dayKey}`]; }
  function getStreak(habitId) {
    let streak = 0;
    for (let i=0; i<=365; i++) { 
      const d = new Date(now.getFullYear(), now.getMonth(), now.getDate() - i); 
      if(isDone(habitId, getDayKey(d))) streak++; else break; 
    }
    return streak;
  }
  function getTotal(habitId) { return allDays.filter(d=>isDone(habitId,d)).length; }

  const doneToday = habits.filter(h=>isDone(h.id,todayKey)).length;
  const heatmapHabit = selectedHabit ? habits.find(h=>h.id===selectedHabit) : null;
  const weeks = getWeeksForHeatmap(allDays);
  const monthLabels = [];
  let lastMonth = -1;
  weeks.forEach((week,wi) => {
    const firstReal = week.find(d=>d!==null);
    if (firstReal) { const m=new Date(firstReal.replace(/-/g, '/')).getMonth(); if(m!==lastMonth){monthLabels.push({wi,label:MONTHS[m]});lastMonth=m;} }
  });
  const allComplete = doneToday === habits.length && habits.length > 0;

  return (
    <div style={{ minHeight:"100vh",background:"#0D0D0D",color:"#F0EDE4",fontFamily:"'DM Mono', monospace" }}>
      <div style={{ background:"#141414",borderBottom:"1px solid #222",padding:"20px 24px 16px",position:"sticky",top:0,zIndex:100 }}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
          <div>
            <div style={{ fontSize:11,letterSpacing:3,color:"#666",textTransform:"uppercase",marginBottom:4 }}>Habit Forge</div>
            <div style={{ fontSize:20,fontWeight:700,letterSpacing:-0.5 }}>{now.toLocaleDateString("th-TH",{weekday:"long",day:"numeric",month:"long"})}</div>
          </div>
          <div style={{ background:allComplete?"#F0EDE4":"#1A1A1A",border:`1px solid ${allComplete?"#F0EDE4":"#333"}`,borderRadius:12,padding:"8px 16px",textAlign:"center" }}>
            <div style={{ fontSize:20,fontWeight:700,color:allComplete?"#0D0D0D":"#F0EDE4" }}>{doneToday}/{habits.length}</div>
            <div style={{ fontSize:9,letterSpacing:2,color:allComplete?"#0D0D0D":"#555",textTransform:"uppercase" }}>done</div>
          </div>
        </div>
        <div style={{ display:"flex",gap:8,marginTop:16 }}>
          {["today","heatmap"].map(t=>(
            <button key={t} onClick={()=>setView(t)} style={{ background:view===t?"#F0EDE4":"transparent",color:view===t?"#0D0D0D":"#555",border:`1px solid ${view===t?"#F0EDE4":"#333"}`,borderRadius:8,padding:"6px 16px",fontSize:11,letterSpacing:2,textTransform:"uppercase",cursor:"pointer",fontFamily:"inherit" }}>{t==="today"?"วันนี้":"Heatmap"}</button>
          ))}
        </div>
      </div>

      <div style={{ padding:"24px" }}>
        {view === "today" && (
          <div>
            {habits.length === 0 ? (
              <div style={{ textAlign:"center",padding:"60px 0",color:"#444" }}>
                <div style={{ fontSize:40,marginBottom:12 }}>🌱</div>
                <div style={{ fontSize:14,letterSpacing:1 }}>ยังไม่มีนิสัย</div>
                <div style={{ fontSize:12,color:"#333",marginTop:4 }}>กด + เพื่อเพิ่มนิสัยแรก</div>
              </div>
            ) : (
              <div style={{ fontSize:10,color:"#383838",letterSpacing:1,textTransform:"uppercase",marginBottom:14 }}>กด ✕ หรือเลื่อนซ้ายเพื่อลบ</div>
            )}
            <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
              {habits.map(habit=>(
                <HabitCard key={habit.id} habit={habit} done={isDone(habit.id,todayKey)} streak={getStreak(habit.id)} onToggle={()=>toggleToday(habit.id)} onDelete={()=>setConfirmDelete(habit)}/>
              ))}
            </div>
          </div>
        )}

        {view === "heatmap" && (
          <div>
            <div style={{ display:"flex",gap:8,flexWrap:"wrap",marginBottom:24 }}>
              {habits.map(h=>{
                const sel=selectedHabit===h.id;
                return (
                  <button key={h.id} onClick={()=>setSelectedHabit(sel?null:h.id)} style={{ background:sel?(h.color||"#4ECDC4"):"#141414",color:sel?"#0D0D0D":"#888",border:`1px solid ${sel?(h.color||"#4ECDC4"):"#333"}`,borderRadius:10,padding:"8px 14px",fontSize:12,letterSpacing:0.5,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:6 }}>
                    <span>{h.icon}</span><span>{h.name}</span>
                  </button>
                );
              })}
            </div>
            {heatmapHabit ? (() => {
              const color = heatmapHabit.color || "#4ECDC4";
              const streak = getStreak(heatmapHabit.id);
              const total = getTotal(heatmapHabit.id);
              // แก้ไข: กรองเฉพาะวันที่หลังจากวันที่สร้างนิสัย (createdAt) จนถึงวันนี้
              const eligible = Math.max(1, allDays.filter(d => d >= heatmapHabit.createdAt && d <= todayKey).length);
              return (
                <div>
                  <div style={{ display:"flex",gap:10,marginBottom:24 }}>
                    {[{label:"ติดต่อกัน",value:`${streak} วัน`,icon:"🔥"},{label:"ทำทั้งหมด",value:`${total} วัน`,icon:"✅"},{label:"อัตราสำเร็จ",value:`${Math.round(total/eligible*100)}%`,icon:"📊"}].map(s=>(
                      <div key={s.label} style={{ flex:1,background:"#141414",border:"1px solid #222",borderRadius:12,padding:"12px 10px",textAlign:"center" }}>
                        <div style={{ fontSize:18 }}>{s.icon}</div>
                        <div style={{ fontSize:16,fontWeight:700,color,marginTop:4 }}>{s.value}</div>
                        <div style={{ fontSize:9,letterSpacing:1,color:"#555",textTransform:"uppercase",marginTop:2 }}>{s.label}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ background:"#141414",border:"1px solid #222",borderRadius:16,padding:"20px 16px",overflowX:"auto" }}>
                    <div style={{ fontSize:11,letterSpacing:2,color:"#555",textTransform:"uppercase",marginBottom:12 }}>365 วันที่ผ่านมา</div>
                    <div style={{ display:"flex",marginBottom:6,gap:3,paddingLeft:20 }}>
                      {weeks.map((_,wi)=>{ const lbl=monthLabels.find(m=>m.wi===wi); return <div key={wi} style={{ width:12,flexShrink:0,fontSize:8,color:"#555" }}>{lbl?lbl.label:""}</div>; })}
                    </div>
                    <div style={{ display:"flex",gap:3 }}>
                      <div style={{ display:"flex",flexDirection:"column",gap:3,marginRight:4 }}>
                        {["S","M","T","W","T","F","S"].map((d,i)=>(<div key={i} style={{ width:12,height:12,fontSize:7,color:"#444",display:"flex",alignItems:"center",justifyContent:"center" }}>{d}</div>))}
                      </div>
                      {weeks.map((week,wi)=>(
                        <div key={wi} style={{ display:"flex",flexDirection:"column",gap:3 }}>
                          {week.map((day,di)=>{
                            if(!day) return <div key={di} style={{ width:12,height:12 }}/>;
                            const done=isDone(heatmapHabit.id,day);
                            const isToday=day===todayKey, future=day>todayKey;
                            return (
                              <div key={day} onClick={()=>{ if(!future) setLogs(prev=>{const key=`${heatmapHabit.id}:${day}`;return{...prev,[key]:!prev[key]};}); }}
                                style={{ width:12,height:12,borderRadius:3,flexShrink:0,background:future?"transparent":done?color:"#1E1E1E",border:isToday?`1px solid ${color}`:future?"1px solid #1A1A1A":"1px solid transparent",cursor:future?"default":"pointer" }}/>
                            );
                          })}
                        </div>
                      ))}
                    </div>
                  </div>
                  <button onClick={()=>setConfirmDelete(heatmapHabit)} style={{ marginTop:16,width:"100%",background:"transparent",border:"1px solid #2A1A1A",borderRadius:10,padding:"12px",color:"#553333",fontSize:12,letterSpacing:1,textTransform:"uppercase",cursor:"pointer",fontFamily:"inherit" }}>🗑️ ลบนิสัยนี้</button>
                </div>
              );
            })() : habits.length > 0 && (
              <div style={{ textAlign:"center",color:"#444",padding:"40px 0" }}>
                <div style={{ fontSize:28,marginBottom:8 }}>👆</div>
                <div style={{ fontSize:13 }}>เลือกนิสัยเพื่อดู Heatmap</div>
              </div>
            )}
          </div>
        )}
      </div>

      {showAdd && (
        <div onClick={e=>{if(e.target===e.currentTarget)setShowAdd(false);}} style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"flex-end",zIndex:200,backdropFilter:"blur(4px)" }}>
          <div style={{ width:"100%",background:"#141414",borderTop:"1px solid #2A2A2A",borderRadius:"20px 20px 0 0",padding:"24px",animation:"slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1)",maxHeight:"92vh",overflowY:"auto" }}>
            <div style={{ fontSize:11,letterSpacing:3,color:"#555",textTransform:"uppercase",marginBottom:20 }}>นิสัยใหม่</div>
            <div style={{ display:"flex",alignItems:"center",gap:14,marginBottom:20 }}>
              <div style={{ width:54,height:54,borderRadius:14,background:newColor+"22",border:`1.5px solid ${newColor}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0 }}>{newIcon}</div>
              <input autoFocus value={newName} onChange={e=>setNewName(e.target.value)} placeholder="ชื่อนิสัย..." style={{ flex:1,background:"#1E1E1E",border:"1px solid #2A2A2A",borderRadius:10,padding:"14px 16px",color:"#F0EDE4",fontSize:16,fontFamily:"inherit",outline:"none" }}/>
            </div>
            <div style={{ display:"flex",gap:6,marginBottom:20 }}>
              {[["icon","🎭 ไอคอน"],["color","🎨 สี"]].map(([t,label])=>(
                <button key={t} onClick={()=>setAddTab(t)}
                  style={{ flex:1,padding:"10px",borderRadius:10,fontFamily:"inherit",fontSize:12,letterSpacing:1,cursor:"pointer",background:addTab===t?"#F0EDE4":"#1A1A1A",color:addTab===t?"#0D0D0D":"#666",border:`1px solid ${addTab===t?"#F0EDE4":"#2A2A2A"}`,transition:"all 0.2s" }}>
                  {label}
                </button>
              ))}
            </div>
            {addTab === "icon" && <EmojiPicker selected={newIcon} onChange={setNewIcon}/>}
            {addTab === "color" && (
              <div style={{ display:"flex",justifyContent:"center",paddingTop:4 }}>
                <ColorWheel color={newColor} onChange={setNewColor}/>
              </div>
            )}
            <div style={{ display:"flex",gap:10,marginTop:24 }}>
              <button onClick={()=>setShowAdd(false)} style={{ flex:1,padding:"14px",background:"transparent",border:"1px solid #2A2A2A",borderRadius:12,color:"#555",fontSize:13,letterSpacing:1,cursor:"pointer",fontFamily:"inherit",textTransform:"uppercase" }}>ยกเลิก</button>
              <button onClick={addHabit} style={{ flex:2,padding:"14px",background:newName?newColor:"#1E1E1E",border:"none",borderRadius:12,color:"#0D0D0D",fontSize:13,letterSpacing:1,cursor:"pointer",fontFamily:"inherit",textTransform:"uppercase",fontWeight:700 }}>เริ่มสร้างเลย ✓</button>
            </div>
          </div>
        </div>
      )}
      {confirmDelete && <DeleteModal habit={confirmDelete} onConfirm={()=>deleteHabit(confirmDelete.id)} onCancel={()=>setConfirmDelete(null)}/>}
      <button onClick={()=>setShowAdd(true)} style={{ position:"fixed",bottom:28,right:24,width:56,height:56,borderRadius:"50%",background:"#F0EDE4",color:"#0D0D0D",border:"none",fontSize:28,cursor:"pointer",boxShadow:"0 4px 24px rgba(240,237,228,0.2)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:150 }}>+</button>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<HabitTracker/>);
</script>
</body>
</html>
